apiVersion: v1
kind: ConfigMap
metadata:
  name: scaling-dashboard-config
  namespace: flavorsnap
  labels:
    app: autoscaler
    component: dashboard
data:
  dashboard.json: |
    {
      "dashboard": {
        "id": null,
        "title": "Intelligent Auto-Scaling Dashboard",
        "tags": ["autoscaling", "kubernetes", "flavorsnap"],
        "timezone": "browser",
        "panels": [
          {
            "id": 1,
            "title": "Current Replicas",
            "type": "stat",
            "targets": [
              {
                "expr": "kube_hpa_status_current_replicas",
                "legendFormat": "{{ $labels.hpa }}"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "color": {
                  "mode": "palette-classic"
                },
                "unit": "short"
              }
            },
            "gridPos": {
              "h": 8,
              "w": 12,
              "x": 0,
              "y": 0
            }
          },
          {
            "id": 2,
            "title": "Resource Utilization",
            "type": "graph",
            "targets": [
              {
                "expr": "kube_pod_container_resource_usage{resource=\"cpu\"} / kube_pod_container_resource_requests{resource=\"cpu\"} * 100",
                "legendFormat": "CPU Usage %"
              },
              {
                "expr": "kube_pod_container_resource_usage{resource=\"memory\"} / kube_pod_container_resource_requests{resource=\"memory\"} * 100",
                "legendFormat": "Memory Usage %"
              }
            ],
            "yAxes": [
              {
                "unit": "percent",
                "max": 100,
                "min": 0
              }
            ],
            "gridPos": {
              "h": 8,
              "w": 12,
              "x": 12,
              "y": 0
            }
          },
          {
            "id": 3,
            "title": "Scaling Events",
            "type": "graph",
            "targets": [
              {
                "expr": "increase(autoscaler_scaling_events_total[5m])",
                "legendFormat": "{{ $labels.direction }}"
              }
            ],
            "gridPos": {
              "h": 8,
              "w": 12,
              "x": 0,
              "y": 8
            }
          },
          {
            "id": 4,
            "title": "Cluster Cost",
            "type": "stat",
            "targets": [
              {
                "expr": "cluster_cost_per_hour",
                "legendFormat": "Cost/Hour"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "unit": "currencyUSD"
              }
            },
            "gridPos": {
              "h": 8,
              "w": 6,
              "x": 12,
              "y": 8
            }
          },
          {
            "id": 5,
            "title": "Cost Efficiency",
            "type": "gauge",
            "targets": [
              {
                "expr": "cost_efficiency_score",
                "legendFormat": "Efficiency Score"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "unit": "percent",
                "max": 100,
                "min": 0,
                "thresholds": {
                  "steps": [
                    {
                      "color": "red",
                      "value": 0
                    },
                    {
                      "color": "yellow",
                      "value": 50
                    },
                    {
                      "color": "green",
                      "value": 80
                    }
                  ]
                }
              }
            },
            "gridPos": {
              "h": 8,
              "w": 6,
              "x": 18,
              "y": 8
            }
          },
          {
            "id": 6,
            "title": "Prediction Accuracy",
            "type": "stat",
            "targets": [
              {
                "expr": "autoscaler_prediction_accuracy",
                "legendFormat": "Accuracy"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "unit": "percent",
                "max": 100,
                "min": 0
              }
            },
            "gridPos": {
              "h": 8,
              "w": 6,
              "x": 0,
              "y": 16
            }
          },
          {
            "id": 7,
            "title": "Scaling Latency",
            "type": "graph",
            "targets": [
              {
                "expr": "autoscaler_scaling_latency_seconds{quantile=\"0.95\"}",
                "legendFormat": "95th Percentile"
              },
              {
                "expr": "autoscaler_scaling_latency_seconds{quantile=\"0.50\"}",
                "legendFormat": "50th Percentile"
              }
            ],
            "yAxes": [
              {
                "unit": "s"
              }
            ],
            "gridPos": {
              "h": 8,
              "w": 12,
              "x": 6,
              "y": 16
            }
          },
          {
            "id": 8,
            "title": "Cost Savings Potential",
            "type": "stat",
            "targets": [
              {
                "expr": "cost_savings_potential",
                "legendFormat": "Savings/Hour"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "unit": "currencyUSD"
              }
            },
            "gridPos": {
              "h": 8,
              "w": 6,
              "x": 18,
              "y": 16
            }
          }
        ],
        "time": {
          "from": "now-1h",
          "to": "now"
        },
        "refresh": "30s"
      }
    }
