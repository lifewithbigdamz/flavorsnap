apiVersion: v1
kind: ServiceMonitor
metadata:
  name: autoscaler-metrics
  namespace: flavorsnap
  labels:
    app: autoscaler
    component: monitoring
spec:
  selector:
    matchLabels:
      app: autoscaler
  endpoints:
  - port: metrics
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s

