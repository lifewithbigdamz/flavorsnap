# Development Environment Configuration
app:
  name: "FlavorSnap"
  version: "2.0.0"
  environment: "development"
  debug: true
  hot_reload: true
  log_level: "DEBUG"
  
server:
  host: "0.0.0.0"
  port: 8000
  workers: 1
  reload: true
  access_log: true
  
database:
  host: "localhost"
  port: 5432
  name: "flavorsnap_dev"
  username: "postgres"
  password: "postgres"
  pool_size: 5
  max_overflow: 10
  echo: true
  
redis:
  host: "localhost"
  port: 6379
  db: 0
  password: null
  ssl: false
  max_connections: 10
  
ml:
  model_path: "models/best_model.pth"
  classes_path: "food_classes.txt"
  confidence_threshold: 0.7
  batch_size: 32
  device: "cpu"
  model_version: "v2.1"
  
upload:
  max_file_size: 10485760  # 10MB
  upload_dir: "uploads"
  allowed_types: ["jpg", "jpeg", "png", "gif", "webp"]
  temp_dir: "temp"
  cleanup_interval: 3600  # 1 hour
  
cache:
  enabled: true
  backend: "redis"
  ttl: 3600  # 1 hour
  max_size: 1000
  
security:
  jwt_secret: "dev-secret-key-change-in-production"
  jwt_expiration: 3600  # 1 hour
  bcrypt_rounds: 10
  rate_limiting:
    enabled: true
    requests_per_minute: 100
  cors:
    enabled: true
    origins: ["http://localhost:3000", "http://127.0.0.1:3000"]
    methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
    headers: ["*"]
    
logging:
  level: "DEBUG"
  format: "detailed"
  handlers: ["console", "file"]
  file_path: "logs/app.log"
  max_file_size: 10485760  # 10MB
  backup_count: 5
  
monitoring:
  enabled: true
  metrics_port: 9090
  health_check_interval: 30
  prometheus:
    enabled: true
    port: 9091
  
features:
  ml_classification: true
  blockchain_integration: true
  analytics: true
  cache_enabled: true
  rate_limiting: true
  hot_reload: true
  
external_services:
  openai:
    api_key: "${OPENAI_API_KEY}"
    model: "gpt-3.5-turbo"
    max_tokens: 1000
  aws:
    access_key: "${AWS_ACCESS_KEY_ID}"
    secret_key: "${AWS_SECRET_ACCESS_KEY}"
    region: "us-east-1"
    s3_bucket: "flavorsnap-dev"
  sentry:
    dsn: "${SENTRY_DSN}"
    environment: "development"
    
performance:
  connection_timeout: 30
  read_timeout: 60
  write_timeout: 60
  max_concurrent_requests: 100
  
validation:
  strict_mode: false
  auto_fix: true
  validate_on_load: true
  
version_control:
  enabled: true
  track_changes: true
  backup_configs: true
  max_versions: 10
