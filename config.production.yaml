# FlavorSnap Production Configuration
# Environment: production

app:
  debug: false
  host: "0.0.0.0"
  port: 80
  secret_key: "${APP_SECRET_KEY}"  # Must be set in production

database:
  pool_size: 20
  max_overflow: 40
  pool_timeout: 60
  pool_recycle: 7200

logging:
  level: "WARNING"
  enable_console: false
  max_bytes: 52428800  # 50MB
  backup_count: 10

security:
  jwt_expiration_hours: 8
  bcrypt_rounds: 15
  rate_limit:
    requests_per_minute: 100
    burst_size: 20

monitoring:
  enable_metrics: true
  metrics_port: 9090
  health_check_interval: 30
  performance_tracking: true

file_storage:
  max_file_size: 10485760  # 10MB
  auto_cleanup_days: 3

cache:
  ttl: 1800

features:
  enable_hot_reload: false
  enable_config_validation: true
  enable_backup: true
  enable_versioning: true
