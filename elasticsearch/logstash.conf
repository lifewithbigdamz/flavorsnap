# Logstash pipeline for FlavorSnap log aggregation
# Collects structured JSON logs from all FlavorSnap services

input {
  # Receive logs from Filebeat agents on each service container
  beats {
    port => 5044
    host => "0.0.0.0"
  }

  # Also accept direct TCP JSON input (useful for local dev)
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  # Parse JSON log lines emitted by the Python structured logger
  if [message] =~ /^\{/ {
    json {
      source => "message"
      target => "log_data"
    }

    mutate {
      rename => {
        "[log_data][timestamp]"  => "log_timestamp"
        "[log_data][level]"      => "log_level"
        "[log_data][logger]"     => "service"
        "[log_data][message]"    => "log_message"
        "[log_data][event_type]" => "event_type"
      }
    }
  }

  # Normalise log level to uppercase
  if [log_level] {
    mutate {
      uppercase => ["log_level"]
    }
  }

  # Tag error logs
  if [log_level] in ["ERROR", "CRITICAL"] {
    mutate {
      add_tag => ["error"]
    }
  }

  # Parse ISO8601 timestamp
  if [log_timestamp] {
    date {
      match => ["log_timestamp", "ISO8601"]
      target => "@timestamp"
    }
  }

  # Drop noisy health-check logs in production
  if [event_type] == "api_request" and [log_message] =~ /\/health/ {
    drop {}
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "flavorsnap-logs-%{+YYYY.MM.dd}"
    document_type => "_doc"
  }

  # Mirror errors to stdout for debugging
  if "error" in [tags] {
    stdout {
      codec => rubydebug
    }
  }
}
