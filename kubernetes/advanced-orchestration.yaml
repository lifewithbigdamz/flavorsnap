# Advanced Container Orchestration for FlavorSnap
# Includes service discovery, auto-scaling, health checks, rolling updates, resource management

---
# Service Mesh with Istio
apiVersion: v1
kind: Namespace
metadata:
  name: istio-system
  labels:
    istio-injection: enabled

---
apiVersion: networking.istio.io/v1alpha3
kind: Gateway
metadata:
  name: flavorsnap-gateway
  namespace: flavorsnap
spec:
  selector:
    istio: ingressgateway
  servers:
  - port:
      number: 80
      name: http
      protocol: HTTP
    hosts:
    - flavorsnap.example.com
  - port:
      number: 443
      name: https
      protocol: HTTPS
    tls:
      mode: SIMPLE
      credentialName: flavorsnap-tls
    hosts:
    - flavorsnap.example.com

---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: flavorsnap-vs
  namespace: flavorsnap
spec:
  hosts:
  - flavorsnap.example.com
  gateways:
  - flavorsnap-gateway
  http:
  - match:
    - uri:
        prefix: /api
    route:
    - destination:
        host: backend-service
        port:
          number: 5000
    timeout: 30s
    retries:
      attempts: 3
      perTryTimeout: 10s
  - match:
    - uri:
        prefix: /
    route:
    - destination:
        host: frontend-service
        port:
          number: 80
    timeout: 10s

---
# Advanced Auto-scaling with Custom Metrics
apiVersion: v1
kind: Service
metadata:
  name: backend-metrics
  namespace: flavorsnap
  labels:
    app: backend
spec:
  selector:
    app: backend
  ports:
  - port: 9090
    targetPort: 9090
    name: metrics

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-advanced-hpa
  namespace: flavorsnap
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend-deployment
  minReplicas: 2
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  - type: Pods
    pods:
      metric:
        name: http_requests_per_second
      target:
        type: AverageValue
        averageValue: "100"
  - type: External
    external:
      metric:
        name: queue_messages_ready
      target:
        type: AverageValue
        averageValue: "30"
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
      - type: Pods
        value: 4
        periodSeconds: 60
      selectPolicy: Max

---
# Vertical Pod Autoscaler
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: backend-vpa
  namespace: flavorsnap
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend-deployment
  updatePolicy:
    updateMode: "Auto"
  resourcePolicy:
    containerPolicies:
    - containerName: backend
      minAllowed:
        cpu: 100m
        memory: 128Mi
      maxAllowed:
        cpu: 2
        memory: 4Gi
      controlledResources: ["cpu", "memory"]

---
# Pod Disruption Budget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: backend-pdb
  namespace: flavorsnap
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: backend

---
# Network Policies
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: flavorsnap-network-policy
  namespace: flavorsnap
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: istio-system
    - podSelector:
        matchLabels:
          app: frontend
    - podSelector:
        matchLabels:
          app: ingress
  - ports:
    - protocol: TCP
      port: 5000
    - protocol: TCP
      port: 3000
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: redis
    - podSelector:
        matchLabels:
          app: postgres
  - to: []
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53

---
# Resource Quotas
apiVersion: v1
kind: ResourceQuota
metadata:
  name: flavorsnap-quota
  namespace: flavorsnap
spec:
  hard:
    requests.cpu: "10"
    requests.memory: 20Gi
    limits.cpu: "20"
    limits.memory: 40Gi
    persistentvolumeclaims: "10"
    pods: "50"
    services: "20"
    secrets: "20"
    configmaps: "20"

---
# Limit Ranges
apiVersion: v1
kind: LimitRange
metadata:
  name: flavorsnap-limits
  namespace: flavorsnap
spec:
  limits:
  - default:
      cpu: 500m
      memory: 512Mi
    defaultRequest:
      cpu: 100m
      memory: 128Mi
    type: Container
  - max:
      cpu: "2"
      memory: 4Gi
    min:
      cpu: 50m
      memory: 64Mi
    type: Container

---
# Advanced Deployment with Rolling Updates
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment-advanced
  namespace: flavorsnap
  labels:
    app: backend-advanced
    tier: backend
    version: v2
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  selector:
    matchLabels:
      app: backend-advanced
  template:
    metadata:
      labels:
        app: backend-advanced
        tier: backend
        version: v2
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
        sidecar.istio.io/inject: "true"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - backend-advanced
              topologyKey: kubernetes.io/hostname
      containers:
      - name: backend
        image: flavorsnap/backend:latest
        ports:
        - containerPort: 5000
          name: http
        - containerPort: 9090
          name: metrics
        envFrom:
        - configMapRef:
            name: flavorsnap-config
        - secretRef:
            name: flavorsnap-secrets
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 30
        volumeMounts:
        - name: uploads-volume
          mountPath: /app/uploads
        - name: model-volume
          mountPath: /app/models
        - name: config-volume
          mountPath: /app/config
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
      volumes:
      - name: uploads-volume
        persistentVolumeClaim:
          claimName: uploads-pvc
      - name: model-volume
        persistentVolumeClaim:
          claimName: model-pvc
      - name: config-volume
        configMap:
          name: flavorsnap-config

---
# Service Discovery with Headless Service
apiVersion: v1
kind: Service
metadata:
  name: backend-headless
  namespace: flavorsnap
  labels:
    app: backend-advanced
spec:
  clusterIP: None
  selector:
    app: backend-advanced
  ports:
  - port: 5000
    targetPort: 5000
    name: http
  - port: 9090
    targetPort: 9090
    name: metrics

---
# StatefulSet for Database with Advanced Features
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-stateful
  namespace: flavorsnap
spec:
  serviceName: postgres-headless
  replicas: 3
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
        envFrom:
        - configMapRef:
            name: flavorsnap-config
        - secretRef:
            name: flavorsnap-secrets
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POSTGRES_REPLICATION_USER
          value: "replicator"
        - name: POSTGRES_REPLICATION_PASSWORD
          valueFrom:
            secretKeyRef:
              name: flavorsnap-secrets
              key: POSTGRES_PASSWORD
        command:
        - bash
        - -c
        - |
          if [ "$POD_NAME" = "postgres-stateful-0" ]; then
            # Master node
            exec docker-entrypoint.sh postgres \
              -c max_connections=200 \
              -c shared_buffers=256MB \
              -c effective_cache_size=1GB \
              -c maintenance_work_mem=64MB \
              -c checkpoint_completion_target=0.9 \
              -c wal_buffers=16MB \
              -c default_statistics_target=100 \
              -c random_page_cost=1.1 \
              -c effective_io_concurrency=200
          else
            # Replica node
            until pg_basebackup -h postgres-stateful-0 -D /var/lib/postgresql/data -U replicator -v -P -W; do
              echo "Waiting for master to be ready..."
              sleep 5
            done
            echo "standby_mode = 'on'" >> /var/lib/postgresql/data/recovery.conf
            echo "primary_conninfo = 'host=postgres-stateful-0 port=5432 user=replicator'" >> /var/lib/postgresql/data/recovery.conf
            chown postgres:postgres /var/lib/postgresql/data/recovery.conf
            chmod 600 /var/lib/postgresql/data/recovery.conf
            exec docker-entrypoint.sh postgres
          fi
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        volumeMounts:
        - name: postgres-volume
          mountPath: /var/lib/postgresql/data
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - postgres
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - postgres
          initialDelaySeconds: 5
          periodSeconds: 5
  volumeClaimTemplates:
  - metadata:
      name: postgres-volume
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 20Gi
      storageClassName: standard

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-headless
  namespace: flavorsnap
  labels:
    app: postgres
spec:
  clusterIP: None
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-master
  namespace: flavorsnap
  labels:
    app: postgres
spec:
  selector:
    app: postgres
    statefulset.kubernetes.io/pod-name: postgres-stateful-0
  ports:
  - port: 5432
    targetPort: 5432

---
# Advanced Monitoring with Prometheus
apiVersion: v1
kind: ServiceMonitor
metadata:
  name: backend-monitor
  namespace: flavorsnap
  labels:
    app: backend-advanced
spec:
  selector:
    matchLabels:
      app: backend-advanced
  endpoints:
  - port: metrics
    interval: 30s
    path: /metrics

---
# Custom Resource for Advanced Deployment Management
apiVersion: v1
kind: ConfigMap
metadata:
  name: deployment-strategy
  namespace: flavorsnap
data:
  strategy.yaml: |
    deployment:
      type: rolling
      maxUnavailable: 25%
      maxSurge: 25%
      progressDeadlineSeconds: 600
      revisionHistoryLimit: 10
    health:
      livenessProbe:
        initialDelaySeconds: 30
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 3
      readinessProbe:
        initialDelaySeconds: 10
        periodSeconds: 5
        timeoutSeconds: 3
        failureThreshold: 3
      startupProbe:
        initialDelaySeconds: 10
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 30
    resources:
      requests:
        memory: "512Mi"
        cpu: "250m"
      limits:
        memory: "2Gi"
        cpu: "1000m"
    scaling:
      minReplicas: 2
      maxReplicas: 20
      targetCPUUtilization: 70
      targetMemoryUtilization: 80

---
# Job for Database Migration
apiVersion: batch/v1
kind: Job
metadata:
  name: db-migration
  namespace: flavorsnap
spec:
  template:
    metadata:
      labels:
        app: db-migration
    spec:
      restartPolicy: OnFailure
      containers:
      - name: migration
        image: flavorsnap/backend:latest
        command: ["python", "migrate.py"]
        envFrom:
        - configMapRef:
            name: flavorsnap-config
        - secretRef:
            name: flavorsnap-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"

---
# CronJob for Regular Maintenance
apiVersion: batch/v1
kind: CronJob
metadata:
  name: maintenance-cronjob
  namespace: flavorsnap
spec:
  schedule: "0 2 * * *"  # Daily at 2 AM
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: maintenance
        spec:
          restartPolicy: OnFailure
          containers:
          - name: maintenance
            image: flavorsnap/backend:latest
            command: ["python", "scripts/maintenance.py"]
            envFrom:
            - configMapRef:
                name: flavorsnap-config
            - secretRef:
                name: flavorsnap-secrets
            resources:
              requests:
                memory: "256Mi"
                cpu: "100m"
              limits:
                memory: "512Mi"
                cpu: "500m"
