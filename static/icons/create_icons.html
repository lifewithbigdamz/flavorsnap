<!DOCTYPE html>
<html>
<head>
    <title>Create PWA Icons</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .icon-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin: 20px 0; }
        .icon-box { text-align: center; border: 1px solid #ddd; padding: 10px; border-radius: 8px; }
        canvas { border: 1px solid #ccc; }
        button { background: #2196F3; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin: 5px; }
    </style>
</head>
<body>
    <h1>FlavorSnap PWA Icon Generator</h1>
    <p>Click the button below to generate all required PWA icons:</p>
    <button onclick="generateAllIcons()">Generate All Icons</button>
    <div id="status"></div>
    
    <div class="icon-container" id="iconContainer"></div>

    <script>
        function createIcon(size) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            
            // Background circle with gradient
            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, '#2196F3');
            gradient.addColorStop(1, '#1976D2');
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(size/2, size/2, size/2 - size/20, 0, 2 * Math.PI);
            ctx.fill();
            
            // White border
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = Math.max(2, size/50);
            ctx.stroke();
            
            // Fork
            ctx.fillStyle = '#ffffff';
            const forkX = size/2 - size/6;
            const forkY = size/2 - size/4;
            const forkWidth = size/8;
            const forkHeight = size/2;
            
            // Fork handle
            ctx.fillRect(forkX - forkWidth/4, forkY + forkHeight/2, forkWidth/2, forkHeight/4);
            
            // Fork prongs
            const prongWidth = forkWidth/3;
            for (let i = 0; i < 3; i++) {
                const x = forkX + (i - 1) * prongWidth;
                ctx.fillRect(x, forkY, prongWidth/2, forkHeight/3);
            }
            
            // Knife
            const knifeX = size/2 + size/12;
            const knifeY = size/2 - size/4;
            const knifeWidth = size/8;
            const knifeHeight = size/2;
            
            // Knife blade
            ctx.beginPath();
            ctx.moveTo(knifeX, knifeY);
            ctx.lineTo(knifeX + knifeWidth/2, knifeY + knifeHeight/3);
            ctx.lineTo(knifeX + knifeWidth/2, knifeY + knifeHeight/2 - knifeHeight/8);
            ctx.lineTo(knifeX, knifeY + knifeHeight/2);
            ctx.closePath();
            ctx.fill();
            
            // Knife handle
            ctx.fillRect(knifeX - knifeWidth/4, knifeY + knifeHeight/2, knifeWidth/2, knifeHeight/4);
            
            // "FS" text
            ctx.fillStyle = '#ffffff';
            ctx.font = `bold ${Math.max(8, size/6)}px Arial`;
            ctx.textAlign = 'center';
            ctx.fillText('FS', size/2, size/2 + size/4);
            
            return canvas;
        }
        
        function downloadIcon(canvas, filename) {
            const link = document.createElement('a');
            link.download = filename;
            link.href = canvas.toDataURL();
            link.click();
        }
        
        function generateAllIcons() {
            const sizes = [72, 96, 128, 144, 152, 192, 384, 512];
            const container = document.getElementById('iconContainer');
            const status = document.getElementById('status');
            
            container.innerHTML = '';
            status.innerHTML = '<p>Generating icons...</p>';
            
            sizes.forEach((size, index) => {
                setTimeout(() => {
                    const canvas = createIcon(size);
                    const filename = `icon-${size}x${size}.png`;
                    
                    // Create icon box
                    const box = document.createElement('div');
                    box.className = 'icon-box';
                    
                    // Add canvas preview
                    const preview = document.createElement('canvas');
                    preview.width = 96;
                    preview.height = 96;
                    const previewCtx = preview.getContext('2d');
                    previewCtx.drawImage(canvas, 0, 0, 96, 96);
                    
                    // Add download button
                    const button = document.createElement('button');
                    button.textContent = `Download ${size}x${size}`;
                    button.onclick = () => downloadIcon(canvas, filename);
                    
                    // Add label
                    const label = document.createElement('div');
                    label.textContent = `${filename}`;
                    
                    box.appendChild(preview);
                    box.appendChild(button);
                    box.appendChild(label);
                    container.appendChild(box);
                    
                    if (index === sizes.length - 1) {
                        status.innerHTML = '<p>All icons generated! Click the download buttons to save each icon.</p>';
                    }
                }, index * 100);
            });
        }
        
        // Auto-generate on page load
        window.onload = () => {
            setTimeout(generateAllIcons, 500);
        };
    </script>
</body>
</html>
