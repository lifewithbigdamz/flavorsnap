<svg width="192" height="192" viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2196F3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1976D2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="96" cy="96" r="86" fill="url(#bg)" stroke="#ffffff" stroke-width="4"/>
  
  <!-- Fork -->
  <g transform="translate(60, 60)">
    <!-- Fork handle -->
    <rect x="-4" y="20" width="8" height="40" fill="#ffffff" rx="2"/>
    <!-- Fork prongs -->
    <rect x="-6" y="0" width="3" height="25" fill="#ffffff" rx="1"/>
    <rect x="-1.5" y="0" width="3" height="25" fill="#ffffff" rx="1"/>
    <rect x="3" y="0" width="3" height="25" fill="#ffffff" rx="1"/>
  </g>
  
  <!-- Knife -->
  <g transform="translate(110, 60)">
    <!-- Knife blade -->
    <path d="M 0 0 L 8 8 L 8 25 L 0 30 Z" fill="#ffffff"/>
    <!-- Knife handle -->
    <rect x="-4" y="20" width="8" height="40" fill="#ffffff" rx="2"/>
  </g>
  
  <!-- FlavorSnap text -->
  <text x="96" y="140" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">FS</text>
  
  <!-- Food bowl icon at bottom -->
  <path d="M 50 160 Q 96 150 142 160 L 140 170 Q 96 165 52 170 Z" fill="#ffffff" opacity="0.8"/>
</svg>
