# FlavorSnap Configuration Management
# Version: 1.0.0
# Environment: development

app:
  name: "flavorsnap"
  version: "1.0.0"
  debug: true
  host: "0.0.0.0"
  port: 5000
  secret_key: "${APP_SECRET_KEY:dev-secret-key-change-in-production}"

database:
  type: "postgresql"
  host: "${DB_HOST:localhost}"
  port: "${DB_PORT:5432}"
  name: "${DB_NAME:flavorsnap}"
  user: "${DB_USER:postgres}"
  password: "${DB_PASSWORD:password}"
  pool_size: 10
  max_overflow: 20
  pool_timeout: 30
  pool_recycle: 3600

ml_model:
  model_path: "${MODEL_PATH:./model.pth}"
  classes_file: "${CLASSES_FILE:./food_classes.txt}"
  input_size: [224, 224]
  batch_size: 32
  device: "${ML_DEVICE:cpu}"

logging:
  level: "${LOG_LEVEL:INFO}"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "${LOG_FILE:./logs/app.log}"
  max_bytes: 10485760  # 10MB
  backup_count: 5
  enable_console: true

security:
  jwt_secret_key: "${JWT_SECRET_KEY:jwt-secret-change-in-production}"
  jwt_expiration_hours: 24
  bcrypt_rounds: 12
  rate_limit:
    requests_per_minute: 60
    burst_size: 10

monitoring:
  enable_metrics: true
  metrics_port: 9090
  health_check_interval: 30
  performance_tracking: true

file_storage:
  upload_folder: "${UPLOAD_FOLDER:./uploads}"
  max_file_size: 16777216  # 16MB
  allowed_extensions: ["jpg", "jpeg", "png", "gif", "bmp"]
  auto_cleanup_days: 7

cache:
  type: "redis"
  host: "${CACHE_HOST:localhost}"
  port: "${CACHE_PORT:6379}"
  password: "${CACHE_PASSWORD:}"
  db: 0
  ttl: 3600
  default_cache_size: 100
  result_cache_size: 50
  queue_cache_size: 200
  cleanup_interval: 300

queue:
  max_workers: 4
  max_size: 10000
  persistence:
    backend: "sqlite"
    db_path: "queue_persistence.db"
    recovery_enabled: true
    cleanup_interval: 3600
  monitoring:
    interval: 30
    max_history: 10000
    enable_alerts: true
  load_balancing:
    strategy: "round_robin"
    worker_health_check: true
  dead_letter_queue:
    max_size: 10000
    retry_delay: 60
    max_retries: 3

features:
  enable_hot_reload: true
  enable_config_validation: true
  enable_backup: true
  enable_versioning: true
  enable_queue_management: true
