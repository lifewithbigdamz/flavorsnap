name: CI

on:
  pull_request:
  push:
    branches: ["main", "master"]
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Unit + integration (with coverage)
        run: python scripts/coverage_report.py

      - name: Performance smoke benchmarks
        if: github.event_name != 'schedule'
        run: python scripts/run_tests.py --performance-smoke

      - name: Performance full benchmarks
        if: github.event_name == 'schedule'
        run: python scripts/run_tests.py --performance-full

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            coverage.xml
            htmlcov
          if-no-files-found: warn

