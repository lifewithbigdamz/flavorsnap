apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: gateway
        image: flavorsnap/api-gateway:latest
        ports:
        - containerPort: 8000
        env:
        - name: ML_MODEL_API_URL
          value: "http://ml-model-api:5000"
        - name: REDIS_URL
          value: "redis://cache-service:6379"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  selector:
    app: api-gateway
  ports:
  - port: 80
    targetPort: 8000
  type: LoadBalancer
