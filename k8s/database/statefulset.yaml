apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-cluster
  namespace: flavorsnap
spec:
  serviceName: "postgres"
  replicas: 3
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:13-alpine
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_DB
          value: flavorsnap
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: password
        volumeMounts:
        - name: pgdata
          mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
  - metadata:
      name: pgdata
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-rw
  namespace: flavorsnap
spec:
  ports:
  - port: 5432
  selector:
    app: postgres
    role: master
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-ro
  namespace: flavorsnap
spec:
  ports:
  - port: 5432
  selector:
    app: postgres
