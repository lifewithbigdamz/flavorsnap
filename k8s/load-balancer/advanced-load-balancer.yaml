apiVersion: v1
kind: ConfigMap
metadata:
  name: advanced-lb-config
  namespace: flavorsnap
data:
  # Load balancing algorithms
  LB_ALGORITHM: "least_connections"  # round_robin, least_connections, ip_hash, weighted_round_robin
  HEALTH_CHECK_INTERVAL: "30"
  HEALTH_CHECK_TIMEOUT: "5"
  HEALTH_CHECK_RETRIES: "3"
  FAILOVER_TIMEOUT: "10"
  CONNECTION_DRAINING_TIMEOUT: "30"
  
  # SSL/TLS configuration
  SSL_CIPHERS: "ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384"
  SSL_PROTOCOLS: "TLSv1.2 TLSv1.3"
  
  # Rate limiting
  RATE_LIMIT_REQUESTS_PER_SECOND: "100"
  RATE_LIMIT_BURST: "200"
  
  # Performance tuning
  WORKER_CONNECTIONS: "4096"
  KEEPALIVE_TIMEOUT: "65"
  CLIENT_MAX_BODY_SIZE: "50M"
  
  # Monitoring
  ENABLE_METRICS: "true"
  METRICS_PORT: "9113"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: advanced-load-balancer
  namespace: flavorsnap
  labels:
    app: advanced-load-balancer
    tier: load-balancer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: advanced-load-balancer
  template:
    metadata:
      labels:
        app: advanced-load-balancer
        tier: load-balancer
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9113"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: nginx-lb
        image: nginx:1.25-alpine
        ports:
        - containerPort: 80
          name: http
        - containerPort: 443
          name: https
        - containerPort: 9113
          name: metrics
        envFrom:
        - configMapRef:
            name: advanced-lb-config
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
        - name: ssl-certs
          mountPath: /etc/nginx/ssl
          readOnly: true
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 15"]
      volumes:
      - name: nginx-config
        configMap:
          name: nginx-lb-config
      - name: ssl-certs
        secret:
          secretName: flavorsnap-tls
          optional: true

---
apiVersion: v1
kind: Service
metadata:
  name: advanced-load-balancer-service
  namespace: flavorsnap
  labels:
    app: advanced-load-balancer
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
    service.beta.kubernetes.io/aws-load-balancer-ssl-ports: "443"
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "tcp"
spec:
  selector:
    app: advanced-load-balancer
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
  - port: 443
    targetPort: 443
    protocol: TCP
    name: https
  - port: 9113
    targetPort: 9113
    protocol: TCP
    name: metrics
  type: LoadBalancer

---
apiVersion: v1
kind: Service
metadata:
  name: backend-headless
  namespace: flavorsnap
  labels:
    app: backend
spec:
  clusterIP: None
  selector:
    app: backend
  ports:
  - port: 5000
    targetPort: 5000
    name: http

---
apiVersion: v1
kind: Service
metadata:
  name: frontend-headless
  namespace: flavorsnap
  labels:
    app: frontend
spec:
  clusterIP: None
  selector:
    app: frontend
  ports:
  - port: 3000
    targetPort: 3000
    name: http

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: advanced-lb-pdb
  namespace: flavorsnap
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: advanced-load-balancer

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: advanced-lb-hpa
  namespace: flavorsnap
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: advanced-load-balancer
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
