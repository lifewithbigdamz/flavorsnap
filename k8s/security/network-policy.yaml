apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: flavorsnap-default-deny
  namespace: flavorsnap
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ml-model-api-ingress
  namespace: flavorsnap
spec:
  podSelector:
    matchLabels:
      app: ml-model-api
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: frontend
    ports:
    - protocol: TCP
      port: 8000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-db-egress
  namespace: flavorsnap
spec:
  podSelector:
    matchLabels:
      app: ml-model-api
  policyTypes:
  - Egress
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: database
    ports:
    - protocol: TCP
      port: 5432
