apiVersion: v1
kind: ConfigMap
metadata:
  name: autoscaling-config
  namespace: flavorsnap
data:
  # HPA Configuration
  HPA_SCALE_UP_COOLDOWN: "60"
  HPA_SCALE_DOWN_COOLDOWN: "300"
  HPA_SCALE_UP_THRESHOLD: "70"
  HPA_SCALE_DOWN_THRESHOLD: "40"
  HPA_MAX_REPLICAS: "20"
  HPA_MIN_REPLICAS: "2"
  
  # Predictive Scaling Configuration
  PREDICTIVE_ENABLED: "true"
  PREDICTIVE_MODEL_PATH: "/models/scaling_model.pkl"
  PREDICTIVE_LOOKBACK_HOURS: "24"
  PREDICTIVE_FORECAST_MINUTES: "30"
  PREDICTIVE_CONFIDENCE_THRESHOLD: "0.7"
  
  # Cost Optimization Configuration
  COST_OPTIMIZATION_ENABLED: "true"
  COST_BUDGET_HOURLY: "10.0"
  COST_SPOT_INSTANCE_RATIO: "0.3"
  COST_RIGHTSIZING_ENABLED: "true"
  COST_SCHEDULED_SCALING: "true"
  
  # Performance Monitoring
  PERFORMANCE_METRICS_INTERVAL: "30"
  PERFORMANCE_RESPONSE_TIME_THRESHOLD: "500"
  PERFORMANCE_ERROR_RATE_THRESHOLD: "5"
  PERFORMANCE_CPU_THRESHOLD: "80"
  PERFORMANCE_MEMORY_THRESHOLD: "85"

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: frontend-hpa
  namespace: flavorsnap
  labels:
    app: frontend
    tier: autoscaling
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend-deployment
  minReplicas: 2
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  - type: Pods
    pods:
      metric:
        name: http_requests_per_second
      target:
        type: AverageValue
        averageValue: "100"
  - type: External
    external:
      metric:
        name: custom_frontend_load_score
      target:
        type: Value
        value: "0.8"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 4
        periodSeconds: 15
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
      - type: Pods
        value: 2
        periodSeconds: 60
      selectPolicy: Min

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: flavorsnap
  labels:
    app: backend
    tier: autoscaling
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend-deployment
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  - type: Pods
    pods:
      metric:
        name: ml_requests_per_second
      target:
        type: AverageValue
        averageValue: "50"
  - type: External
    external:
      metric:
        name: custom_backend_queue_length
      target:
        type: Value
        value: "100"
  - type: External
    external:
      metric:
        name: custom_ml_processing_time
      target:
        type: Value
        value: "2000"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 25
        periodSeconds: 60
      - type: Pods
        value: 1
        periodSeconds: 60
      selectPolicy: Min

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: load-balancer-hpa
  namespace: flavorsnap
  labels:
    app: advanced-load-balancer
    tier: autoscaling
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: advanced-load-balancer
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  - type: External
    external:
      metric:
        name: nginx_connections_active
      target:
        type: Value
        value: "1000"
  - type: External
    external:
      metric:
        name: nginx_request_rate
      target:
        type: Value
        value: "5000"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
      - type: Percent
        value: 100
        periodSeconds: 10
      - type: Pods
        value: 2
        periodSeconds: 10
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 180
      policies:
      - type: Percent
        value: 20
        periodSeconds: 30
      - type: Pods
        value: 1
        periodSeconds: 30
      selectPolicy: Min

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: redis-hpa
  namespace: flavorsnap
  labels:
    app: redis
    tier: autoscaling
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: redis-deployment
  minReplicas: 1
  maxReplicas: 3
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  - type: External
    external:
      metric:
        name: redis_memory_used
      target:
        type: Value
        value: "1Gi"
  - type: External
    external:
      metric:
        name: redis_connections
      target:
        type: Value
        value: "500"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 30
      - type: Pods
        value: 1
        periodSeconds: 30
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 25
        periodSeconds: 60
      - type: Pods
        value: 1
        periodSeconds: 60
      selectPolicy: Min

---
apiVersion: autoscaling/v2beta2
kind: HorizontalPodAutoscaler
metadata:
  name: postgres-hpa
  namespace: flavorsnap
  labels:
    app: postgres
    tier: autoscaling
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: postgres-deployment
  minReplicas: 1
  maxReplicas: 3
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  - type: External
    external:
      metric:
        name: postgres_connections_active
      target:
        type: Value
        value: "100"
  - type: External
    external:
      metric:
        name: postgres_database_size
      target:
        type: Value
        value: "10Gi"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 120
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
      - type: Pods
        value: 1
        periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 600
      policies:
      - type: Percent
        value: 10
        periodSeconds: 120
      - type: Pods
        value: 1
        periodSeconds: 120
      selectPolicy: Min

---
