# Kubernetes Secrets Infrastructure for FlavorSnap
# Comprehensive secrets management with encryption, rotation, and monitoring

apiVersion: v1
kind: Namespace
metadata:
  name: flavorsnap-secrets
  labels:
    name: flavorsnap-secrets
    component: secrets-management

---
# ConfigMap for secrets management configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: secrets-config
  namespace: flavorsnap-secrets
  labels:
    app: flavorsnap-secrets
    component: config
data:
  config.yaml: |
    # Secrets Management Configuration
    version: "1.0"
    
    encryption:
      algorithm: "AES-256-CBC"
      key_derivation: "PBKDF2"
      iterations: 100000
      salt_length: 16
      iv_length: 16
    
    rotation:
      enabled: true
      check_interval: "1h"
      default_policy: "monthly"
      default_interval_days: 30
      auto_rotate: true
      notification_before_days: 7
    
    storage:
      type: "kubernetes"
      backup_enabled: true
      backup_interval: "24h"
      backup_retention_days: 30
      encryption_at_rest: true
    
    cache:
      enabled: true
      ttl: "5m"
      max_size: 1000
      redis_enabled: true
    
    audit:
      enabled: true
      log_level: "INFO"
      retention_days: 365
      include_values: false
    
    monitoring:
      enabled: true
      metrics_port: 9092
      health_check_interval: "30s"
      prometheus_enabled: true
    
    security:
      access_control: true
      rbac_enabled: true
      network_policy: true
      pod_security_policy: true
    
    integration:
      aws_secrets_manager: false
      vault_integration: false
      external_kms: false

---
# Secrets Manager Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: secrets-manager
  namespace: flavorsnap-secrets
  labels:
    app: flavorsnap-secrets
    component: secrets-manager
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flavorsnap-secrets
      component: secrets-manager
  template:
    metadata:
      labels:
        app: flavorsnap-secrets
        component: secrets-manager
    spec:
      serviceAccountName: secrets-manager
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: secrets-manager
        image: flavorsnap/secrets-manager:latest
        ports:
        - containerPort: 8080
          name: http
        - containerPort: 9092
          name: metrics
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: MASTER_ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: master-encryption-key
              key: key
        - name: REDIS_HOST
          value: "redis.secrets.svc.cluster.local"
        - name: REDIS_PORT
          value: "6379"
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: redis-password
              key: password
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: aws-credentials
              key: access_key_id
          optional: true
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: aws-credentials
              key: secret_access_key
          optional: true
        - name: AWS_REGION
          value: "us-east-1"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: secrets-storage
          mountPath: /app/secrets
          readOnly: true
        - name: config
          mountPath: /app/config
          readOnly: true
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
      volumes:
      - name: secrets-storage
        persistentVolumeClaim:
          claimName: secrets-storage-pvc
      - name: config
        configMap:
          name: secrets-config
      nodeSelector:
        node-role.kubernetes.io/worker: "true"
      tolerations:
      - key: "node-role.kubernetes.io/worker"
        operator: "Exists"
        effect: "NoSchedule"

---
# Secrets Manager Service
apiVersion: v1
kind: Service
metadata:
  name: secrets-manager
  namespace: flavorsnap-secrets
  labels:
    app: flavorsnap-secrets
    component: secrets-manager
spec:
  selector:
    app: flavorsnap-secrets
    component: secrets-manager
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
  - name: metrics
    port: 9092
    targetPort: 9092
    protocol: TCP
  type: ClusterIP

---
# Redis for caching
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: flavorsnap-secrets
  labels:
    app: flavorsnap-secrets
    component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flavorsnap-secrets
      component: redis
  template:
    metadata:
      labels:
        app: flavorsnap-secrets
        component: redis
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
          name: redis
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: redis-password
              key: password
        command:
        - redis-server
        - --requirepass
        - $(REDIS_PASSWORD)
        - --appendonly
        - "yes"
        - --maxmemory
        - "256mb"
        - --maxmemory-policy
        - "allkeys-lru"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        volumeMounts:
        - name: redis-data
          mountPath: /data
        livenessProbe:
          exec:
            command:
            - redis-cli
            - -a
            - $(REDIS_PASSWORD)
            - ping
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - redis-cli
            - -a
            - $(REDIS_PASSWORD)
            - ping
          initialDelaySeconds: 5
          periodSeconds: 5
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
      volumes:
      - name: redis-data
        persistentVolumeClaim:
          claimName: redis-data-pvc

---
# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: flavorsnap-secrets
  labels:
    app: flavorsnap-secrets
    component: redis
spec:
  selector:
    app: flavorsnap-secrets
    component: redis
  ports:
  - name: redis
    port: 6379
    targetPort: 6379
    protocol: TCP
  type: ClusterIP

---
# Persistent Volume Claims
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: secrets-storage-pvc
  namespace: flavorsnap-secrets
  labels:
    app: flavorsnap-secrets
    component: storage
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data-pvc
  namespace: flavorsnap-secrets
  labels:
    app: flavorsnap-secrets
    component: redis
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: standard

---
# Master Encryption Key Secret
apiVersion: v1
kind: Secret
metadata:
  name: master-encryption-key
  namespace: flavorsnap-secrets
  labels:
    app: flavorsnap-secrets
    component: encryption
type: Opaque
data:
  # Base64 encoded encryption key (32 bytes)
  # This should be replaced with a real key in production
  key: "bXlzdGVyeWtleWJhc2U2NGVuY29kZWQzMmJ5dGVzZm9ycHJvZHVjdGlvbg=="

---
# Redis Password Secret
apiVersion: v1
kind: Secret
metadata:
  name: redis-password
  namespace: flavorsnap-secrets
  labels:
    app: flavorsnap-secrets
    component: redis
type: Opaque
data:
  # Base64 encoded Redis password
  password: "c3Ryb25ncmVkaXNwYXNzd29yZA=="

---
# AWS Credentials Secret (Optional)
apiVersion: v1
kind: Secret
metadata:
  name: aws-credentials
  namespace: flavorsnap-secrets
  labels:
    app: flavorsnap-secrets
    component: aws
type: Opaque
data:
  # Base64 encoded AWS credentials (optional)
  access_key_id: ""
  secret_access_key: ""

---
# Sample Application Secrets
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: flavorsnap-secrets
  labels:
    app: flavorsnap-secrets
    component: application
type: Opaque
data:
  # Base64 encoded application secrets
  jwt-secret: "bXlqd3RzZWNyZXRrZXlmb3Jwcm9kdWN0aW9u"
  database-password: "c2VjdXJlZGF0YWJhc2VwYXNzd29yZA=="
  api-key: "c2VjdXJlYXBpa2V5Zm9yZXh0ZXJuYWxzZXJ2aWNlcw=="
  encryption-key: "bXlfZW5jcnlwdGlvbl9rZXlfZm9yX2FwcF9kYXRh"

---
# ServiceAccount for Secrets Manager
apiVersion: v1
kind: ServiceAccount
metadata:
  name: secrets-manager
  namespace: flavorsnap-secrets
  labels:
    app: flavorsnap-secrets
    component: rbac

---
# RBAC Role for Secrets Manager
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secrets-manager-role
  namespace: flavorsnap-secrets
  labels:
    app: flavorsnap-secrets
    component: rbac
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "create", "update", "patch"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list"]
- apiGroups: ["batch"]
  resources: ["jobs", "cronjobs"]
  verbs: ["get", "list", "create", "update", "patch", "delete"]

---
# RoleBinding for Secrets Manager
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: secrets-manager-binding
  namespace: flavorsnap-secrets
  labels:
    app: flavorsnap-secrets
    component: rbac
subjects:
- kind: ServiceAccount
  name: secrets-manager
  namespace: flavorsnap-secrets
roleRef:
  kind: Role
  name: secrets-manager-role
  apiGroup: rbac.authorization.k8s.io

---
# ClusterRole for Cross-Namespace Access
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: secrets-manager-cluster-role
  labels:
    app: flavorsnap-secrets
    component: rbac
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list"]

---
# ClusterRoleBinding for Secrets Manager
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: secrets-manager-cluster-binding
  labels:
    app: flavorsnap-secrets
    component: rbac
subjects:
- kind: ServiceAccount
  name: secrets-manager
  namespace: flavorsnap-secrets
roleRef:
  kind: ClusterRole
  name: secrets-manager-cluster-role
  apiGroup: rbac.authorization.k8s.io

---
# Network Policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: secrets-network-policy
  namespace: flavorsnap-secrets
  labels:
    app: flavorsnap-secrets
    component: security
spec:
  podSelector:
    matchLabels:
      app: flavorsnap-secrets
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: flavorsnap
    - namespaceSelector:
        matchLabels:
          name: monitoring
    - namespaceSelector:
        matchLabels:
          name: kube-system
    ports:
    - protocol: TCP
      port: 8080
    - protocol: TCP
      port: 9092
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: flavorsnap
    - namespaceSelector:
        matchLabels:
          name: monitoring
    - namespaceSelector:
        matchLabels:
          name: kube-system
    ports:
    - protocol: TCP
      port: 6379
    - protocol: TCP
      port: 443
    - protocol: UDP
      port: 53

---
# Pod Security Policy
apiVersion: policy/v1beta1
kind: PodSecurityPolicy
metadata:
  name: secrets-psp
  namespace: flavorsnap-secrets
  labels:
    app: flavorsnap-secrets
    component: security
spec:
  privileged: false
  allowPrivilegeEscalation: false
  requiredDropCapabilities:
  - ALL
  volumes:
  - 'configMap'
  - 'emptyDir'
  - 'projected'
  - 'secret'
  - 'downwardAPI'
  - 'persistentVolumeClaim'
  runAsUser:
    rule: 'MustRunAsNonRoot'
  seLinux:
    rule: 'RunAsAny'
  fsGroup:
    rule: 'RunAsAny'

---
# Secret Rotation CronJob
apiVersion: batch/v1
kind: CronJob
metadata:
  name: secret-rotation
  namespace: flavorsnap-secrets
  labels:
    app: flavorsnap-secrets
    component: rotation
spec:
  schedule: "0 2 * * *"  # Daily at 2 AM
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: flavorsnap-secrets
            component: rotation
        spec:
          serviceAccountName: secrets-manager
          restartPolicy: OnFailure
          containers:
          - name: rotation
            image: flavorsnap/secrets-manager:latest
            command:
            - python
            - -c
            - |
              from secrets_manager import secrets_manager
              import logging
              
              logging.basicConfig(level=logging.INFO)
              logger = logging.getLogger(__name__)
              
              # Get secrets that need rotation
              rotation_status = secrets_manager.get_rotation_status()
              
              # Rotate overdue secrets
              for secret_name in rotation_status['overdue_rotation']:
                  try:
                      success = secrets_manager.rotate_secret(secret_name, "cronjob")
                      logger.info(f"Rotated secret {secret_name}: {success}")
                  except Exception as e:
                      logger.error(f"Failed to rotate secret {secret_name}: {e}")
              
              # Log rotation status
              logger.info(f"Rotation completed. Overdue: {len(rotation_status['overdue_rotation'])}, Pending: {len(rotation_status['pending_rotation'])}")
            env:
            - name: ENVIRONMENT
              value: "production"
            - name: MASTER_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: master-encryption-key
                  key: key
            resources:
              requests:
                memory: "128Mi"
                cpu: "100m"
              limits:
                memory: "256Mi"
                cpu: "200m"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                - ALL

---
# Backup CronJob
apiVersion: batch/v1
kind: CronJob
metadata:
  name: secrets-backup
  namespace: flavorsnap-secrets
  labels:
    app: flavorsnap-secrets
    component: backup
spec:
  schedule: "0 3 * * 0"  # Weekly on Sunday at 3 AM
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: flavorsnap-secrets
            component: backup
        spec:
          serviceAccountName: secrets-manager
          restartPolicy: OnFailure
          containers:
          - name: backup
            image: flavorsnap/secrets-manager:latest
            command:
            - python
            - -c
            - |
              import json
              import os
              from datetime import datetime
              from pathlib import Path
              import logging
              
              logging.basicConfig(level=logging.INFO)
              logger = logging.getLogger(__name__)
              
              # Export all secrets
              from secrets_manager import secrets_manager
              
              secrets_data = secrets_manager.list_secrets(include_values=False)
              audit_data = secrets_manager.get_audit_log()
              
              # Create backup
              backup_data = {
                  'timestamp': datetime.utcnow().isoformat(),
                  'environment': os.getenv('ENVIRONMENT'),
                  'secrets_metadata': secrets_data,
                  'audit_log': audit_data
              }
              
              # Save to backup location
              backup_dir = Path('/app/backups')
              backup_dir.mkdir(exist_ok=True)
              
              backup_file = backup_dir / f'secrets_backup_{datetime.utcnow().strftime("%Y%m%d_%H%M%S")}.json'
              
              with open(backup_file, 'w') as f:
                  json.dump(backup_data, f, indent=2, default=str)
              
              logger.info(f"Backup created: {backup_file}")
              
              # Clean old backups (keep last 30 days)
              import glob
              backup_files = glob.glob(str(backup_dir / 'secrets_backup_*.json'))
              backup_files.sort()
              
              if len(backup_files) > 30:
                  for old_backup in backup_files[:-30]:
                      os.remove(old_backup)
                      logger.info(f"Removed old backup: {old_backup}")
            env:
            - name: ENVIRONMENT
              value: "production"
            - name: MASTER_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: master-encryption-key
                  key: key
            volumeMounts:
            - name: backup-storage
              mountPath: /app/backups
            resources:
              requests:
                memory: "128Mi"
                cpu: "100m"
              limits:
                memory: "256Mi"
                cpu: "200m"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                - ALL
          volumes:
          - name: backup-storage
            persistentVolumeClaim:
              claimName: secrets-storage-pvc

---
# Prometheus ServiceMonitor
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: secrets-manager-metrics
  namespace: flavorsnap-secrets
  labels:
    app: flavorsnap-secrets
    component: monitoring
spec:
  selector:
    matchLabels:
      app: flavorsnap-secrets
      component: secrets-manager
  endpoints:
  - port: metrics
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s

---
# Prometheus Rules for Secrets Monitoring
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: secrets-alerts
  namespace: flavorsnap-secrets
  labels:
    app: flavorsnap-secrets
    component: monitoring
spec:
  groups:
  - name: secrets.rules
    rules:
  - alert: SecretsManagerDown
    expr: up{job="secrets-manager"} == 0
    for: 1m
    labels:
      severity: critical
      service: secrets-manager
    annotations:
      summary: "Secrets manager is down"
      description: "Secrets manager has been down for more than 1 minute"
  
  - alert: SecretRotationFailed
    expr: rate(secret_rotations_total{success="false"}[5m]) > 0
    for: 2m
    labels:
      severity: warning
      service: secrets-manager
    annotations:
      summary: "Secret rotation failures detected"
      description: "Secret rotation failures detected: {{ $value }} failures per minute"
  
  - alert: SecretAccessHigh
    expr: rate(secret_access_total[5m]) > 10
    for: 5m
    labels:
      severity: warning
      service: secrets-manager
    annotations:
      summary: "High secret access rate"
      description: "Secret access rate is {{ $value }} accesses per minute"
  
  - alert: SecretExpiringSoon
    expr: secret_expiration_days < 7
    for: 1h
    labels:
      severity: warning
      service: secrets-manager
    annotations:
      summary: "Secret expiring soon"
      description: "Secret {{ $labels.secret_name }} expires in {{ $value }} days"
  
  - alert: EncryptionOperationFailed
    expr: rate(encryption_operations_total{success="false"}[5m]) > 0
    for: 1m
    labels:
      severity: critical
      service: secrets-manager
    annotations:
      summary: "Encryption operation failures"
      description: "Encryption operation failures detected: {{ $value }} failures per minute"

---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: secrets-manager-hpa
  namespace: flavorsnap-secrets
  labels:
    app: flavorsnap-secrets
    component: autoscaling
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: secrets-manager
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60

---
# Pod Disruption Budget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: secrets-manager-pdb
  namespace: flavorsnap-secrets
  labels:
    app: flavorsnap-secrets
    component: pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: flavorsnap-secrets
      component: secrets-manager
